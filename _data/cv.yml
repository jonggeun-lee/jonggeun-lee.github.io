    Publications:
      - title: "Don't Adapt Small Language Models for Tools; Adapt Tool Schemas to the Models"
        authors:
          - Jonggeun Lee*
          - Woojung Song*
          - Jongwook Han
          - Haesung Pyun
          - Yohan Jo
        publisher: "ACL 2026 Main (acceptance rate: 19%)"
        releaseDate: 2026
        summary: Proposed PA-Tool, a training-free method that adapts tool schemas to align with models' pretrained knowledge, improving tool-use performance by up to 17% and reducing schema misalignment errors by 80%.

      - title: "SpeakerSleuth: Can LALMs Judge Speaker Consistency across Multi-turn Dialogues?"
        authors:
          - Jonggeun Lee
          - Junseong Pyo
          - Gyuhyeon Seo
          - Yohan Jo
        publisher: "ACL 2026 Main (acceptance rate: 19%)"
        releaseDate: 2026
        summary: Introduced a benchmark evaluating whether Large Audio-Language Models can reliably judge speaker consistency across multi-turn conversations, revealing significant biases in prioritizing text over acoustics.

      - title: "SpokenUS: A Spoken User Simulator for Task-Oriented Dialogue"
        authors:
          - Jonggeun Lee*
          - Junseong Pyo*
          - Jeongmin Park
          - Yohan Jo
        publisher: "Under review; Machine Learning for Audio Workshop @ ICML 2026"
        releaseDate: 2026
        summary: Developed a spoken user simulator that jointly generates text and speech tokens, modeling realistic spoken behaviors (cross-turn slots, barge-in, disfluency, emotion-aware speech) for task-oriented dialogue systems.

      - title: "SimuHome: A Temporal- and Environment-Aware Benchmark for Smart Home LLM Agents"
        authors:
          - Gyuhyeon Seo
          - Jungwoo Yang
          - Junseong Pyo
          - Nalim Kim
          - Jonggeun Lee
          - Yohan Jo
        publisher: "ICLR 2026 Oral (acceptance rate: 1.13%)"
        releaseDate: 2026
        summary: Developed a time-accelerated smart home simulation environment with 600 benchmark episodes, revealing that even top models struggle with temporal scheduling and state verification.

      - title: Quantifying Data Contamination in Psychometric Evaluations of LLMs
        authors:
          - Jongwook Han*
          - Woojung Song*
          - Jonggeun Lee*
          - Yohan Jo
        publisher: "EACL 2026 Findings (acceptance rate: 36.2%)"
        releaseDate: 2026
        summary: Proposed a framework to systematically measure data contamination in psychometric evaluations of LLMs, providing evidence of strong contamination in popular inventories.

      - title: "Tool-Augmented Agents: Evolution from Autonomy to Interaction"
        authors:
          - Yohan Jo
          - Jonggeun Lee
        publisher: "Korean Institute of Information Scientists and Engineers, Vol. 43, No. 11, pp. 14-25"
        releaseDate: 2025
        summary: Comprehensive survey examining the evolution of tool-augmented agents, focusing on the shift from autonomous capabilities to interactive paradigms in human-centered interaction.

